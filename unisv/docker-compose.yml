services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  django:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis

  celery-worker:
    build: .
    command: celery -A unisv worker -l INFO -P threads
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis

  celery-beat:
    build: .
    command: celery -A unisv beat -l INFO
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
